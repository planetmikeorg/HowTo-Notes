#version=RHEL9
# System authorization information
auth --enableshadow --passalgo=sha512

# Use network installation
url --url="http://mirror.example.com/rocky/9/BaseOS/x86_64/os/"

# Keyboard layouts
keyboard --vckeymap=us --xlayouts='us'

# System language
lang en_US.UTF-8

# Network information
network --bootproto=static --device=eth0 --ip=192.168.1.100 --netmask=255.255.255.0 --gateway=192.168.1.1 --nameserver=8.8.8.8 --ipv6=auto --activate
network --hostname=ansible-control.local

# Root password (change this!)
rootpw --iscrypted $6$rounds=4096$saltsaltsal$hashhashhashhash

# System timezone
timezone America/New_York --utc

# System bootloader configuration
bootloader --location=mbr --boot-drive=sda

# Partition clearing information
clearpart --all --initlabel --drives=sda

# Disk partitioning information
part /boot --fstype="xfs" --ondisk=sda --size=1024
part pv.01 --fstype="lvmpv" --ondisk=sda --size=1 --grow
volgroup vg00 pv.01
logvol / --fstype="xfs" --size=20480 --name=root --vgname=vg00
logvol /var --fstype="xfs" --size=20480 --name=var --vgname=vg00
logvol swap --fstype="swap" --size=4096 --name=swap --vgname=vg00

# Reboot after installation
reboot

%packages
@core
@base
wget
curl
vim
git
net-tools
bind-utils
yum-utils
python3
python3-pip
python3-devel
openssl-devel
libffi-devel
sshpass
rsync
tar
gzip
bzip2
unzip
device-mapper-persistent-data
lvm2
%end

%post --log=/root/ks-post.log

# Install Ansible
python3 -m pip install --upgrade pip
pip3 install ansible ansible-core

# Install Ansible collections
ansible-galaxy collection install ansible.posix
ansible-galaxy collection install community.general
ansible-galaxy collection install kubernetes.core

# Install additional Python packages for Ansible modules
pip3 install jmespath netaddr kubernetes openshift pyyaml

# Create Ansible directory structure
mkdir -p /etc/ansible
mkdir -p /root/ansible/{playbooks,roles,group_vars,host_vars}

# Create basic Ansible configuration
cat <<EOF > /etc/ansible/ansible.cfg
[defaults]
host_key_checking = False
deprecation_warnings = False
interpreter_python = auto_silent
roles_path = /root/ansible/roles
retry_files_enabled = False
log_path = /var/log/ansible.log

[privilege_escalation]
become = True
become_method = sudo
become_user = root
become_ask_pass = False

[ssh_connection]
ssh_args = -o ControlMaster=auto -o ControlPersist=60s
pipelining = True
EOF

# Generate SSH key for Ansible
ssh-keygen -t rsa -b 4096 -f /root/.ssh/id_rsa -N ""

# Install kubectl
cat <<EOF > /etc/yum.repos.d/kubernetes.repo
[kubernetes]
name=Kubernetes
baseurl=https://pkgs.k8s.io/core:/stable:/v1.28/rpm/
enabled=1
gpgcheck=1
gpgkey=https://pkgs.k8s.io/core:/stable:/v1.28/rpm/repodata/repomd.xml.key
EOF
dnf install -y kubectl

# Install Helm
curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

# Install Rancher CLI
wget https://github.com/rancher/cli/releases/download/v2.7.0/rancher-linux-amd64-v2.7.0.tar.gz
tar -xzf rancher-linux-amd64-v2.7.0.tar.gz
mv rancher-v2.7.0/rancher /usr/local/bin/
rm -rf rancher-v2.7.0 rancher-linux-amd64-v2.7.0.tar.gz

# Configure firewall for Ansible
systemctl enable firewalld
firewall-cmd --permanent --add-service=ssh
firewall-cmd --reload

# Keep SELinux permissive (can be hardened later)
sed -i 's/^SELINUX=enforcing/SELINUX=permissive/' /etc/selinux/config

# Create sample Ansible playbook for RKE2 deployment
cat <<'PLAYBOOK' > /root/ansible/playbooks/deploy-rke2.yml
---
- name: Deploy RKE2 Cluster
  hosts: rke2_cluster
  become: yes
  tasks:
    - name: Include RKE2 preparation role
      include_role:
        name: rke2-prep
      when: "'rke2_cluster' in group_names"

- name: Install RKE2 Servers
  hosts: rke2_servers
  become: yes
  serial: 1
  tasks:
    - name: Include RKE2 server role
      include_role:
        name: rke2-server

- name: Install RKE2 Agents
  hosts: rke2_agents
  become: yes
  tasks:
    - name: Include RKE2 agent role
      include_role:
        name: rke2-agent
PLAYBOOK

echo "Ansible control node setup complete."
echo "SSH public key: $(cat /root/.ssh/id_rsa.pub)"
echo "Copy this key to managed nodes for passwordless SSH access."
echo "Create your inventory files and playbooks in: /root/ansible/"
echo "Run playbooks with: ansible-playbook -i <inventory> <playbook.yml>"

%end