# Kickstart file for RKE2 node installation
# Supports RHEL/Rocky Linux 8.x and 9.x

# Use text installation
text

# Keyboard layouts
keyboard --vckeymap=us --xlayouts='us'

# System language
lang en_US.UTF-8

# Network configuration
# Primary interface - General connectivity (customize IP, gateway, DNS)
network --bootproto=static --device=ens192 --ip=192.168.1.100 --netmask=255.255.255.0 --gateway=192.168.1.1 --nameserver=8.8.8.8,8.8.4.4 --hostname=rke2-node01.example.com --activate --onboot=yes

# Secondary interface - Cluster traffic (customize IP, no gateway)
network --bootproto=static --device=ens224 --ip=10.0.0.100 --netmask=255.255.255.0 --nodefroute --onboot=yes

# Root password (change this!)
rootpw --plaintext changeme

# SSH key for Ansible control node (replace with actual public key)
# sshkey --username=root "ssh-rsa AAAAB3NzaC1yc2EAAAADAQABAAACAQD... root@ansible-control.local"

# System authorization information
authselect select sssd

# SELinux configuration (RKE2 requires permissive or disabled)
selinux --permissive

# Firewall configuration (SSH enabled for Ansible)
firewall --enabled --service=ssh

# System timezone
timezone America/New_York --utc

# Bootloader configuration
bootloader --location=mbr --boot-drive=sda

# Partition clearing
clearpart --all --initlabel --drives=sda,sdb,sdc

# Disk partitioning
# sda - Boot and system
part /boot --fstype=xfs --size=1024 --ondisk=sda
part /boot/efi --fstype=efi --size=200 --ondisk=sda
part pv.01 --size=1 --grow --ondisk=sda

# sdb - Pod storage
part pv.02 --size=1 --grow --ondisk=sdb

# sdc - Longhorn storage
part pv.03 --size=1 --grow --ondisk=sdc

# Volume groups and logical volumes
volgroup vg_system pv.01
logvol / --vgname=vg_system --fstype=xfs --size=51200 --name=lv_root
logvol /var --vgname=vg_system --fstype=xfs --size=51200 --name=lv_var
logvol /var/lib/rancher --vgname=vg_system --fstype=xfs --size=102400 --name=lv_rancher --grow
logvol swap --vgname=vg_system --fstype=swap --size=8192 --name=lv_swap

volgroup vg_pods pv.02
logvol /var/lib/kubelet --vgname=vg_pods --fstype=xfs --size=1 --name=lv_kubelet --grow

volgroup vg_longhorn pv.03
logvol /var/lib/longhorn --vgname=vg_longhorn --fstype=xfs --size=1 --name=lv_longhorn --grow

# Reboot after installation
reboot

%packages
@core
@standard
curl
wget
git
vim
iptables
container-selinux
iscsi-initiator-utils
nfs-utils
python3
python3-pip
sudo
openssl
%end

%post --log=/root/ks-post.log

# Disable swap (required for Kubernetes)
swapoff -a
sed -i '/swap/d' /etc/fstab

# Load required kernel modules for RKE2 with Cilium CNI
cat <<EOF > /etc/modules-load.d/rke2.conf
# Standard Kubernetes modules
br_netfilter
overlay

# Cilium CNI requirements
ip_vs
ip_vs_rr
ip_vs_wrr
ip_vs_sh
nf_conntrack

# eBPF support (Cilium)
xt_socket
EOF

# Configure sysctl for RKE2 with Cilium
cat <<EOF > /etc/sysctl.d/90-rke2.conf
# Kubernetes networking
net.bridge.bridge-nf-call-iptables = 1
net.bridge.bridge-nf-call-ip6tables = 1
net.ipv4.ip_forward = 1

# Cilium eBPF requirements
net.core.bpf_jit_enable = 1
net.core.bpf_jit_harden = 0
net.ipv4.conf.all.rp_filter = 0
net.ipv4.conf.default.rp_filter = 0
kernel.unprivileged_bpf_disabled = 1

# Kubernetes system
vm.overcommit_memory = 1
vm.panic_on_oom = 0
kernel.panic = 10
kernel.panic_on_oops = 1
fs.inotify.max_user_instances = 8192
fs.inotify.max_user_watches = 524288

# Cilium performance tuning
net.ipv4.neigh.default.gc_thresh1 = 80000
net.ipv6.neigh.default.gc_thresh1 = 80000
net.ipv4.neigh.default.gc_thresh2 = 90000
net.ipv6.neigh.default.gc_thresh2 = 90000
net.ipv4.neigh.default.gc_thresh3 = 100000
net.ipv6.neigh.default.gc_thresh3 = 100000
EOF

# Mount BPF filesystem for Cilium
mkdir -p /sys/fs/bpf
echo "none /sys/fs/bpf bpf rw,nosuid,nodev,noexec,relatime,mode=700 0 0" >> /etc/fstab
mount /sys/fs/bpf

# Create RKE2 config directory and configure Cilium as CNI
mkdir -p /etc/rancher/rke2
cat <<EOF > /etc/rancher/rke2/config.yaml
# Disable default Canal CNI, Cilium will be installed via Helm
cni: none
disable:
  - rke2-canal
EOF

# Disable NetworkManager for better network stability
systemctl disable NetworkManager
systemctl enable network

# Enable and start iSCSI for Longhorn
systemctl enable iscsid
systemctl start iscsid

# Configure Longhorn mount point
mkdir -p /var/lib/longhorn
chmod 700 /var/lib/longhorn

# Download RKE2 installation script
curl -sfL https://get.rke2.io -o /root/install-rke2.sh
chmod +x /root/install-rke2.sh

# Install Python packages for Ansible
pip3 install --upgrade pip
pip3 install jmespath

# Create ansible user for remote management (optional, can use root)
# useradd -m -s /bin/bash ansible
# echo "ansible:changeme" | chpasswd
# echo "ansible ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/ansible
# chmod 440 /etc/sudoers.d/ansible
# mkdir -p /home/ansible/.ssh
# chmod 700 /home/ansible/.ssh
# Add Ansible control node SSH key to /home/ansible/.ssh/authorized_keys
# chown -R ansible:ansible /home/ansible/.ssh

# Configure SSH for Ansible
cat <<EOF >> /etc/ssh/sshd_config

# Ansible management configuration
PermitRootLogin yes
PubkeyAuthentication yes
PasswordAuthentication yes
UseDNS no
EOF

# Ensure SSH is enabled and started
systemctl enable sshd
systemctl start sshd

# Configure firewall for RKE2 and Ansible
systemctl enable firewalld
systemctl start firewalld

# SSH (Ansible management)
firewall-cmd --permanent --add-service=ssh

# RKE2 Server ports (uncomment for control plane nodes)
# firewall-cmd --permanent --add-port=6443/tcp    # Kubernetes API
# firewall-cmd --permanent --add-port=9345/tcp    # RKE2 supervisor API
# firewall-cmd --permanent --add-port=10250/tcp   # Kubelet metrics
# firewall-cmd --permanent --add-port=2379-2380/tcp # etcd

# RKE2 Agent/All nodes
firewall-cmd --permanent --add-port=10250/tcp   # Kubelet metrics
firewall-cmd --permanent --add-port=30000-32767/tcp # NodePort range

# Cluster traffic (if using separate interface)
firewall-cmd --permanent --add-interface=ens224 --zone=trusted

# Reload firewall
firewall-cmd --reload

echo "Kickstart post-installation complete."
echo "Node is ready for Ansible management."
echo "SSH enabled on port 22."
echo "Add Ansible control node SSH public key to /root/.ssh/authorized_keys"
echo "Or uncomment ansible user creation section above."
echo ""
echo "Node is prepared for RKE2 with Cilium CNI:"
echo "- Kernel modules loaded (eBPF support)"
echo "- Sysctl configured for Cilium"
echo "- BPF filesystem mounted"
echo "- RKE2 config set to disable Canal (cni: none)"
echo ""
echo "Deploy RKE2 and Cilium using Ansible playbook from control node."

%end